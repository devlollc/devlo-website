<svg xmlns="http://www.w3.org/2000/svg" width="932" height="416" viewBox="0 0 932 416" role="img" aria-labelledby="title desc">
  <title id="title">Outbound Expert Certified 2024 badge</title>
  <desc id="desc">Blue outbound expert certification badge with the year 2024.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dfe5f8" />
      <stop offset="100%" stop-color="#cfd8f2" />
    </linearGradient>
    <linearGradient id="medalBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4d80ff" />
      <stop offset="100%" stop-color="#1744dc" />
    </linearGradient>
    <linearGradient id="ribbonLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bdd0ff" />
      <stop offset="100%" stop-color="#7fa1ff" />
    </linearGradient>
    <linearGradient id="ribbonDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f7fff" />
      <stop offset="100%" stop-color="#1f55f2" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1634a0" flood-opacity="0.2" />
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#7ea0ff" flood-opacity="0.55" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="18" y="14" width="896" height="348" rx="30" fill="url(#panel)" />
  </g>

  <g transform="translate(62 52)">
    <g filter="url(#softGlow)" opacity="0.9">
      <circle cx="92" cy="92" r="89" fill="#c5d4ff" />
      <circle cx="92" cy="20" r="24" fill="#c5d4ff" />
      <circle cx="147" cy="38" r="24" fill="#c5d4ff" />
      <circle cx="164" cy="92" r="24" fill="#c5d4ff" />
      <circle cx="147" cy="146" r="24" fill="#c5d4ff" />
      <circle cx="92" cy="164" r="24" fill="#c5d4ff" />
      <circle cx="37" cy="146" r="24" fill="#c5d4ff" />
      <circle cx="20" cy="92" r="24" fill="#c5d4ff" />
      <circle cx="37" cy="38" r="24" fill="#c5d4ff" />
    </g>

    <circle cx="92" cy="92" r="72" fill="url(#medalBlue)" />
    <circle cx="92" cy="92" r="54" fill="#f1f5ff" opacity="0.28" />
    <circle cx="92" cy="92" r="42" fill="#ffffff" opacity="0.22" />

    <rect x="67" y="66" width="50" height="50" rx="12" fill="#f5f8ff" opacity="0.95" />
    <rect x="78" y="77" width="28" height="28" rx="7" fill="none" stroke="#2563eb" stroke-width="6" />
    <circle cx="92" cy="91" r="5" fill="#2563eb" />

    <path d="M60 163h34v128l-17-15-17 15z" fill="url(#ribbonLight)" />
    <path d="M94 163h34v128l-17-15-17 15z" fill="url(#ribbonDark)" />
  </g>

  <g font-family="Avenir Next, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="284" y="146" font-size="112" font-weight="500" fill="#273f95">outbound</text>
    <text x="292" y="232" font-size="78" font-weight="700" letter-spacing="1.5" fill="#4c7cf5">EXPERT</text>
    <text x="294" y="306" font-size="48" font-weight="700" letter-spacing="6" fill="#314f9d">★★★★★</text>
    <text x="560" y="306" font-size="52" font-weight="700" fill="#3f72ef">CERTIFIED 2024</text>
  </g>
</svg>
