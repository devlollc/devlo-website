name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel@50.34.3 --prod --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Alias devlo.ch to latest deployment
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          echo "Fetching deployment ID for $DEPLOY_URL..."

          # Extract just the hostname from the URL
          DEPLOY_HOST=$(echo "$DEPLOY_URL" | sed 's|https://||')

          DEPLOY_ID=$(curl -s "https://api.vercel.com/v13/deployments/$DEPLOY_HOST?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")

          echo "Deployment ID: $DEPLOY_ID"

          if [ -z "$DEPLOY_ID" ]; then
            echo "ERROR: Could not find deployment ID"
            exit 1
          fi

          echo "Assigning devlo.ch alias..."
          RESULT=$(curl -s -X POST "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"alias":"devlo.ch"}')
          echo "$RESULT"

          if echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if 'alias' in d else 1)" 2>/dev/null; then
            echo "devlo.ch alias assigned successfully."
          else
            echo "ERROR: Failed to assign devlo.ch alias"
            echo "$RESULT"
            exit 1
          fi
