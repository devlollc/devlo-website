name: Notify AIOS on Content Change

# Disabled after the GitHub org migration: the old alldevlo/aios-devlo
# repository no longer receives website sync events, and devlo-aios does not
# currently define a repository_dispatch listener for this event.
on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled sync
        run: |
          echo "Website-to-AIOS repository_dispatch is disabled."
          echo "Re-enable only after devlo-aios owns a documented sync listener."
